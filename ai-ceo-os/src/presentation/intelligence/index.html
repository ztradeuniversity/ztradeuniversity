<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Playbooks — AI CEO OS</title>
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/theme.css" />
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/base.css" />
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/components.css" />
</head>
<body class="ceo-auth-pending">
  <div class="ceo-app-shell">
    <aside class="ceo-app-sidebar" id="ceo-sidebar-slot"></aside>
    <header class="ceo-app-header" id="ceo-header-slot"></header>
    <main class="ceo-app-main">
      <div class="ceo-content">
        <h1>Playbooks</h1>
        <p class="ceo-text-secondary">The locked research rendered as execution playbooks — what to do, where, in which language, and why. Everything below is read from the seeded verdicts; nothing is re-searched or invented here.</p>

        <div id="ceo-playbooks-tabs-group">
          <div class="ceo-tabs">
            <button class="ceo-tab" data-tab="countries" aria-selected="true">Countries</button>
            <button class="ceo-tab" data-tab="languages">Languages</button>
            <button class="ceo-tab" data-tab="platforms">Platforms</button>
            <button class="ceo-tab" data-tab="funnel">Funnel</button>
            <button class="ceo-tab" data-tab="physical">Physical</button>
            <button class="ceo-tab" data-tab="tools">Founder Tools</button>
            <button class="ceo-tab" data-tab="roadmap">Roadmap</button>
            <button class="ceo-tab" data-tab="automation">Automation</button>
          </div>

          <div class="ceo-tab-panel" data-tab-panel="countries">
            <div id="pb-countries"><div class="ceo-skeleton" style="height: 10em;"></div></div>
          </div>

          <div class="ceo-tab-panel" data-tab-panel="languages" hidden>
            <div id="pb-languages"><div class="ceo-skeleton" style="height: 8em;"></div></div>
          </div>

          <div class="ceo-tab-panel" data-tab-panel="platforms" hidden>
            <div id="pb-platforms"><div class="ceo-skeleton" style="height: 8em;"></div></div>
          </div>

          <div class="ceo-tab-panel" data-tab-panel="funnel" hidden>
            <div id="pb-funnel"><div class="ceo-skeleton" style="height: 10em;"></div></div>
          </div>

          <div class="ceo-tab-panel" data-tab-panel="physical" hidden>
            <div id="pb-physical"><div class="ceo-skeleton" style="height: 10em;"></div></div>
          </div>

          <div class="ceo-tab-panel" data-tab-panel="tools" hidden>
            <div id="pb-tools"><div class="ceo-skeleton" style="height: 8em;"></div></div>
          </div>

          <div class="ceo-tab-panel" data-tab-panel="roadmap" hidden>
            <div id="pb-roadmap"><div class="ceo-skeleton" style="height: 8em;"></div></div>
          </div>

          <div class="ceo-tab-panel" data-tab-panel="automation" hidden>
            <div id="pb-automation"><div class="ceo-skeleton" style="height: 8em;"></div></div>
          </div>
        </div>
      </div>
    </main>
    <footer class="ceo-app-footer" id="ceo-footer-slot"></footer>
  </div>
  <script type="module">
    import { initLayout } from '/ai-ceo-os/src/presentation/layout/layout.js';
    import { initTabs } from '/ai-ceo-os/src/presentation/shared/components/tabs.js';
    import { initPlaybooksPage } from '/ai-ceo-os/src/presentation/intelligence/playbooks-page.js';
    initLayout('intelligence').then((user) => {
      if (!user) return;
      initTabs('#ceo-playbooks-tabs-group');
      initPlaybooksPage();
    });
  </script>
</body>
</html>
