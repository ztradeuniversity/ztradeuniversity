<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Today — AI CEO OS</title>
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/theme.css" />
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/base.css" />
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/components.css" />
</head>
<body class="ceo-auth-pending">
  <div class="ceo-app-shell">
    <aside class="ceo-app-sidebar" id="ceo-sidebar-slot"></aside>
    <header class="ceo-app-header" id="ceo-header-slot"></header>
    <main class="ceo-app-main">
      <div class="ceo-content">
        <div class="ceo-flex ceo-items-center ceo-gap-4" style="flex-wrap: wrap; margin-bottom: var(--ceo-space-2);">
          <h1 style="margin: 0;">Today</h1>
          <div class="ceo-field" style="margin: 0;">
            <input class="ceo-input" type="date" id="home-date-picker" style="max-width: 12em;" />
          </div>
        </div>
        <p id="home-mentor-line" class="ceo-text-secondary" style="margin-top: 0; margin-bottom: var(--ceo-space-6);"></p>

        <!-- 1. IB Growth -->
        <section class="ceo-card" style="margin-bottom: var(--ceo-space-6);">
          <div class="ceo-flex ceo-items-center ceo-gap-3" style="flex-wrap: wrap;">
            <h3 style="margin: 0; flex: 1;">IB Growth</h3>
            <a class="ceo-text-secondary" style="font-size: var(--ceo-font-size-sm);" href="/ai-ceo-os/src/presentation/intelligence/index.html">See Complete Plan →</a>
          </div>
          <div id="home-ib-growth" style="margin-top: var(--ceo-space-3);"><div class="ceo-skeleton" style="height: 8em;"></div></div>
        </section>

        <!-- 2. Physical Activity -->
        <section class="ceo-card" style="margin-bottom: var(--ceo-space-6);">
          <h3 style="margin-top: 0;">Physical Activity</h3>
          <div id="home-physical"><div class="ceo-skeleton" style="height: 5em;"></div></div>
        </section>

        <!-- 3. Personal Trading -->
        <section class="ceo-card" style="margin-bottom: var(--ceo-space-6);">
          <div class="ceo-flex ceo-items-center ceo-gap-3" style="flex-wrap: wrap;">
            <h3 style="margin: 0; flex: 1;">Personal Trading</h3>
            <a class="ceo-text-secondary" style="font-size: var(--ceo-font-size-sm);" href="/ai-ceo-os/src/presentation/trading/index.html">Open full Trading module →</a>
          </div>
          <div id="home-trading-checkin" style="margin-top: var(--ceo-space-3);"><div class="ceo-skeleton" style="height: 8em;"></div></div>
        </section>
      </div>
    </main>
    <footer class="ceo-app-footer" id="ceo-footer-slot"></footer>
  </div>

  <script type="module">
    import { initLayout } from '/ai-ceo-os/src/presentation/layout/layout.js';
    import { initHome } from '/ai-ceo-os/src/presentation/command-center/home.js';
    const user = await initLayout('command-center');
    if (user) initHome();
  </script>
</body>
</html>
