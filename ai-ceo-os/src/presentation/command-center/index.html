<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Home — AI CEO OS</title>
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/theme.css" />
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/base.css" />
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/components.css" />
</head>
<body class="ceo-auth-pending">
  <div class="ceo-app-shell">
    <aside class="ceo-app-sidebar" id="ceo-sidebar-slot"></aside>
    <header class="ceo-app-header" id="ceo-header-slot"></header>
    <main class="ceo-app-main">
      <div class="ceo-content">
        <h1>Today's Mission</h1>

        <!-- ① Critical warnings (hidden when empty — never "no warnings" noise) -->
        <section id="home-warnings" hidden style="margin-bottom: var(--ceo-space-4);"></section>

        <!-- ② Mission banner: day type + mentor line + time -->
        <section class="ceo-card" id="home-mission-banner" style="margin-bottom: var(--ceo-space-6);">
          <div class="ceo-skeleton" style="height: 3em;"></div>
        </section>

        <!-- ③ Today's Top 3 -->
        <section class="ceo-card" style="margin-bottom: var(--ceo-space-6);">
          <h3>Today's Top 3</h3>
          <div id="home-top3"><div class="ceo-skeleton" style="height: 8em;"></div></div>
          <div id="home-rest" style="margin-top: var(--ceo-space-4);"></div>
        </section>

        <!-- ④ Core block -->
        <section class="ceo-card" style="margin-bottom: var(--ceo-space-6);">
          <h3>Core Block <span class="ceo-text-muted" style="font-size: var(--ceo-font-size-sm);">— the daily non-negotiables</span></h3>
          <div id="home-core"><div class="ceo-skeleton" style="height: 3em;"></div></div>
        </section>

        <!-- ⑤ Needs attention -->
        <section class="ceo-card" style="margin-bottom: var(--ceo-space-6);">
          <h3>Needs Attention</h3>
          <div id="home-attention"><div class="ceo-skeleton" style="height: 3em;"></div></div>
        </section>

        <!-- ⑥ Headline KPI -->
        <section class="ceo-card" style="margin-bottom: var(--ceo-space-6);">
          <h3 id="home-kpi-label">This Week's Number</h3>
          <div id="home-kpi"><div class="ceo-skeleton" style="height: 3em;"></div></div>
        </section>

        <!-- ⑦ Shutdown -->
        <section class="ceo-card" style="margin-bottom: var(--ceo-space-6);">
          <h3>End of Day</h3>
          <p class="ceo-text-secondary" style="font-size: var(--ceo-font-size-sm);">2 minutes: mark the day, one honest line. Tomorrow's plan learns from it.</p>
          <div class="ceo-field">
            <label class="ceo-label" for="home-shutdown-note">One line about today</label>
            <input class="ceo-input" id="home-shutdown-note" maxlength="500" placeholder="Aaj kya seekha / kya atka..." />
          </div>
          <button class="ceo-btn ceo-btn-primary" id="home-shutdown-btn">Complete shutdown</button>
          <span id="home-shutdown-msg" class="ceo-text-muted" style="margin-left: var(--ceo-space-3); font-size: var(--ceo-font-size-sm);"></span>
        </section>
      </div>
    </main>
    <footer class="ceo-app-footer" id="ceo-footer-slot"></footer>
  </div>

  <script type="module">
    import { initLayout } from '/ai-ceo-os/src/presentation/layout/layout.js';
    import { initHome } from '/ai-ceo-os/src/presentation/command-center/home.js';
    const user = await initLayout('command-center');
    if (user) initHome();
  </script>
</body>
</html>
