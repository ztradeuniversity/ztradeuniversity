<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Reset password — AI CEO OS</title>
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/theme.css" />
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/base.css" />
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/components.css" />
  <style>
    .ceo-auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--ceo-space-6);
    }
    .ceo-auth-card {
      width: 100%;
      max-width: 380px;
    }
    .ceo-auth-brand {
      text-align: center;
      font-size: var(--ceo-font-size-xl);
      font-weight: 700;
      color: var(--ceo-accent);
      margin-bottom: var(--ceo-space-8);
    }
  </style>
</head>
<body>
  <main class="ceo-auth-page">
    <div class="ceo-auth-card">
      <div class="ceo-auth-brand">AI CEO OS</div>

      <!-- Request mode: enter email, get a reset link -->
      <div class="ceo-card" id="ceo-reset-request-panel">
        <h3>Reset your password</h3>
        <p class="ceo-text-secondary" style="font-size: var(--ceo-font-size-sm)">
          Enter your email and we'll send a reset link.
        </p>
        <form id="ceo-reset-request-form" novalidate>
          <div id="ceo-reset-request-error" class="ceo-alert ceo-alert-critical" hidden></div>
          <div id="ceo-reset-request-success" class="ceo-alert ceo-alert-info" hidden>
            Check your email for a reset link.
          </div>
          <div class="ceo-field">
            <label class="ceo-label" for="ceo-reset-email">Email</label>
            <input class="ceo-input" type="email" id="ceo-reset-email" name="email" autocomplete="username" required />
          </div>
          <button type="submit" class="ceo-btn ceo-btn-primary" id="ceo-reset-request-submit" style="width: 100%; justify-content: center;">
            Send reset link
          </button>
        </form>
        <div style="text-align: center; margin-top: var(--ceo-space-4);">
          <a href="/ai-ceo-os/src/presentation/auth/login.html" style="font-size: var(--ceo-font-size-sm);">Back to sign in</a>
        </div>
      </div>

      <!-- Confirm mode: reached via the emailed link, set a new password -->
      <div class="ceo-card" id="ceo-reset-confirm-panel" hidden>
        <h3>Choose a new password</h3>
        <form id="ceo-reset-confirm-form" novalidate>
          <div id="ceo-reset-confirm-error" class="ceo-alert ceo-alert-critical" hidden></div>
          <div class="ceo-field">
            <label class="ceo-label" for="ceo-new-password">New password</label>
            <input class="ceo-input" type="password" id="ceo-new-password" name="password" autocomplete="new-password" required minlength="8" />
          </div>
          <button type="submit" class="ceo-btn ceo-btn-primary" id="ceo-reset-confirm-submit" style="width: 100%; justify-content: center;">
            Update password
          </button>
        </form>
      </div>
    </div>
  </main>

  <script type="module" src="/ai-ceo-os/src/presentation/auth/reset-password.js"></script>
</body>
</html>
