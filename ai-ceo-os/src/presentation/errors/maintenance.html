<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Under maintenance — AI CEO OS</title>
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/theme.css" />
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/base.css" />
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/components.css" />
  <style>
    .ceo-error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--ceo-space-6); }
    .ceo-error-card { max-width: 420px; text-align: center; }
    .ceo-error-code { font-size: 2.25rem; font-weight: 700; color: var(--ceo-status-warning); margin-bottom: var(--ceo-space-2); }
  </style>
</head>
<body>
  <main class="ceo-error-page">
    <div class="ceo-card ceo-error-card">
      <div class="ceo-error-code">Under maintenance</div>
      <p class="ceo-text-secondary">
        The AI CEO Operating System is temporarily offline for maintenance
        (<code>core.maintenance-mode</code> is on). This is shown only to the founder — it
        has no effect on the public Z Trade University site.
      </p>
    </div>
  </main>
</body>
</html>
