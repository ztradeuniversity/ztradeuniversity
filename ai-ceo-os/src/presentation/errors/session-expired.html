<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Session expired — AI CEO OS</title>
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/theme.css" />
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/base.css" />
  <link rel="stylesheet" href="/ai-ceo-os/src/presentation/shared/styles/components.css" />
  <style>
    .ceo-error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--ceo-space-6); }
    .ceo-error-card { max-width: 420px; text-align: center; }
    .ceo-error-code { font-size: 2.25rem; font-weight: 700; color: var(--ceo-status-info); margin-bottom: var(--ceo-space-2); }
  </style>
</head>
<body>
  <main class="ceo-error-page">
    <div class="ceo-card ceo-error-card">
      <div class="ceo-error-code">Session expired</div>
      <p class="ceo-text-secondary">You were signed in, but your session has expired. Sign in again to continue.</p>
      <a href="/ai-ceo-os/src/presentation/auth/login.html" class="ceo-btn ceo-btn-primary">Sign in again</a>
    </div>
  </main>
</body>
</html>
