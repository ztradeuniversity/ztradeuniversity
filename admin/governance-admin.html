<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Governance Admin — Z Trade University</title>
  <link rel="icon" type="image/png" href="/assets/ztu-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── ZTU Governance Admin — dark + gold, evidence-first, component-based ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#100e0a; --panel:#171410; --card:#1e1a13; --card2:#241f17; --inset:#0c0a07;
      --border:rgba(200,156,63,.16); --border2:rgba(200,156,63,.28);
      --gold:#c89c3f; --gold2:#d4ae5e; --gold3:#e6c987;
      --text:#ece7dd; --muted:#9a8f7c; --dim:#6f6553;
      --ok:#5bbb7b; --warn:#e0b24a; --bad:#e2685f; --idle:#6f6553; --info:#6ea8d8;
      --radius:14px; --sidebar:250px;
    }
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:radial-gradient(1200px 600px at 82% -12%,rgba(200,156,63,.07),transparent),var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.55;min-height:100vh}
    a{color:inherit;text-decoration:none}
    code{font-family:'Courier New',monospace;font-size:.92em;background:rgba(200,156,63,.08);border:1px solid var(--border);border-radius:5px;padding:1px 5px;color:var(--gold3)}
    ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:rgba(200,156,63,.22);border-radius:8px}

    /* Layout */
    .layout{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh}
    aside{position:sticky;top:0;height:100vh;background:linear-gradient(180deg,var(--panel),#120f0b);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 12px;overflow-y:auto}
    .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px;border-bottom:1px solid var(--border);margin-bottom:12px}
    .brand .shield{width:38px;height:38px;border-radius:10px;background:linear-gradient(150deg,#3d2a08,#8c6c1f 55%,var(--gold2));display:flex;align-items:center;justify-content:center;font-family:'Manrope';font-weight:800;color:var(--gold3);font-size:19px;box-shadow:0 4px 16px rgba(200,156,63,.35)}
    .brand b{font-size:14px;font-weight:800;letter-spacing:-.2px;display:block}
    .brand small{font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
    nav.side{display:flex;flex-direction:column;gap:1px}
    nav.side .navgroup{font-size:9.5px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;color:var(--dim);padding:12px 12px 5px}
    nav.side a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s}
    nav.side a:hover{background:rgba(200,156,63,.07);color:var(--text)}
    nav.side a.active{background:linear-gradient(90deg,rgba(200,156,63,.16),rgba(200,156,63,.03));color:var(--gold3);box-shadow:inset 2px 0 0 var(--gold)}
    nav.side a .ico{width:16px;text-align:center;opacity:.9}
    nav.side a .st{margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--idle);flex:0 0 auto}
    nav.side a .st.ok{background:var(--ok)} nav.side a .st.warn{background:var(--warn)} nav.side a .st.bad{background:var(--bad)}
    .side-foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--border);font-size:10.5px;color:var(--dim);line-height:1.6}
    .side-foot a{color:var(--gold3);font-weight:700}

    /* Topbar */
    main{min-width:0;display:flex;flex-direction:column;min-height:100vh}
    .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 26px;background:rgba(16,14,10,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
    .topbar h1{font-family:'Manrope';font-size:18px;font-weight:800;letter-spacing:-.4px}
    .topbar .sub{font-size:11.5px;color:var(--muted);margin-top:1px}
    .top-right{display:flex;align-items:center;gap:10px}
    .conn{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--muted);border:1px solid var(--border2);border-radius:100px;padding:6px 13px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--idle);box-shadow:0 0 0 3px rgba(111,101,83,.18)}
    .dot.live{background:var(--ok);box-shadow:0 0 0 3px rgba(91,187,123,.18)}
    .dot.part{background:var(--warn);box-shadow:0 0 0 3px rgba(224,178,74,.18)}

    /* Sections & grid */
    .wrap{padding:20px 26px 60px;flex:1}
    section.module{display:none;animation:fade .22s ease}
    section.module.active{display:block}
    @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .grid{display:grid;gap:13px}
    .grid.cols-5{grid-template-columns:repeat(5,1fr)}
    .grid.cols-4{grid-template-columns:repeat(4,1fr)}
    .grid.cols-3{grid-template-columns:repeat(3,1fr)}
    .grid.cols-2{grid-template-columns:repeat(2,1fr)}
    @media(max-width:1280px){.grid.cols-5{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:1100px){.grid.cols-4{grid-template-columns:repeat(2,1fr)}.grid.cols-3{grid-template-columns:repeat(2,1fr)}}

    /* Executive hero */
    .hero{display:grid;grid-template-columns:1.15fr .85fr;gap:14px;margin-bottom:14px}
    @media(max-width:980px){.hero{grid-template-columns:1fr}}
    .hero-card{background:linear-gradient(150deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;position:relative;overflow:hidden}
    .hero-card::after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(200,156,63,.10),transparent 70%);pointer-events:none}
    .hero-title{font-family:'Manrope';font-size:23px;font-weight:800;letter-spacing:-.6px;display:flex;align-items:center;gap:12px}
    .hero-title .pill{font-family:'Inter';font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--gold3);border:1px solid var(--border2);border-radius:100px;padding:3px 10px;background:rgba(200,156,63,.06)}
    .hero-desc{font-size:12.5px;color:var(--muted);margin-top:8px;max-width:52ch}
    .kv{display:grid;grid-template-columns:auto 1fr;gap:7px 16px;margin-top:16px;font-size:12.5px}
    .kv dt{color:var(--dim);font-weight:600;white-space:nowrap}
    .kv dd{color:var(--text);font-weight:700;text-align:right}
    /* Health ring */
    .ringwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px;height:100%}
    .ring{position:relative;width:150px;height:150px}
    .ring svg{transform:rotate(-90deg)}
    .ring .lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .ring .lbl b{font-family:'Manrope';font-size:38px;font-weight:800;line-height:1}
    .ring .lbl span{font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:4px}

    /* Status ribbon (pills) */
    .ribbon{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:14px}
    @media(max-width:1280px){.ribbon{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:760px){.ribbon{grid-template-columns:repeat(2,1fr)}}
    .stat{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:12px;padding:13px 14px;position:relative}
    .stat .lab{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:7px}
    .stat .lab .ic{font-size:13px;opacity:.85}
    .stat .val{font-family:'Manrope';font-size:19px;font-weight:800;margin-top:8px;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
    .stat .sub{font-size:11px;color:var(--dim);margin-top:3px;min-height:14px}
    .stat .led{width:9px;height:9px;border-radius:50%;flex:0 0 auto;background:var(--idle)}
    .led.ok{background:var(--ok);box-shadow:0 0 8px rgba(91,187,123,.5)} .led.warn{background:var(--warn);box-shadow:0 0 8px rgba(224,178,74,.5)}
    .led.bad{background:var(--bad);box-shadow:0 0 8px rgba(226,104,95,.5)} .led.wait{background:var(--info)} .led.idle{background:var(--idle)}

    /* Reusable card */
    .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:var(--radius);padding:15px 16px;position:relative;transition:.16s}
    .card:hover{border-color:var(--border2)}
    .card .k{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--muted)}
    .card .v{font-family:'Manrope';font-size:22px;font-weight:800;margin-top:7px;letter-spacing:-.4px;word-break:break-word}
    .card .meta{display:flex;gap:7px;align-items:center;margin-top:9px;flex-wrap:wrap}
    .card.full{grid-column:1/-1}
    .card h3{font-family:'Manrope';font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .sec-title{font-family:'Manrope';font-size:13px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--gold3);margin:22px 2px 11px;display:flex;align-items:center;gap:9px}
    .sec-title::after{content:"";flex:1;height:1px;background:var(--border)}

    /* Documentation panel */
    .doc{background:linear-gradient(180deg,rgba(30,26,19,.7),rgba(18,15,11,.7));border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
    .doc summary{list-style:none;cursor:pointer;padding:14px 18px;display:flex;align-items:center;gap:11px;font-weight:700;font-size:14px}
    .doc summary::-webkit-details-marker{display:none}
    .doc summary .chev{margin-left:auto;color:var(--muted);transition:.2s;font-size:12px}
    .doc[open] summary .chev{transform:rotate(90deg)}
    .doc summary .tag{font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--gold3);border:1px solid var(--border2);border-radius:100px;padding:2px 9px;background:rgba(200,156,63,.06)}
    .doc-body{padding:2px 18px 18px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:14px 26px}
    @media(max-width:820px){.doc-body{grid-template-columns:1fr}}
    .doc-body .field{font-size:12.5px}
    .doc-body .field.wide{grid-column:1/-1}
    .doc-body .field .lab{font-size:10.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--gold3);margin-bottom:4px}
    .doc-body .field p{color:var(--muted);margin:0 0 4px}
    .doc-body ul{margin:2px 0 0 16px;color:var(--muted)} .doc-body li{margin-bottom:3px}

    /* Badges */
    .badge{font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:3px 8px;border-radius:100px;border:1px solid transparent;white-space:nowrap}
    .badge.nc{color:var(--dim);border-color:var(--border);background:rgba(255,255,255,.02)}
    .badge.wait{color:var(--warn);border-color:rgba(224,178,74,.3);background:rgba(224,178,74,.07)}
    .badge.ok{color:var(--ok);border-color:rgba(91,187,123,.3);background:rgba(91,187,123,.07)}
    .badge.bad{color:var(--bad);border-color:rgba(226,104,95,.3);background:rgba(226,104,95,.07)}
    .badge.info{color:var(--info);border-color:rgba(110,168,216,.3);background:rgba(110,168,216,.07)}
    .badge.src{color:var(--gold3);border-color:var(--border2);background:rgba(200,156,63,.06)}

    /* Tables */
    table{width:100%;border-collapse:collapse;font-size:12.5px}
    th,td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:top}
    th{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700}
    td{color:var(--text)} tr:last-child td{border-bottom:none}
    td.mono{font-family:'Courier New',monospace;font-size:11.5px;color:var(--muted)}
    .empty{color:var(--dim);font-size:12.5px;padding:16px 12px;text-align:center}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:8px;font-family:'Inter';font-size:12.5px;font-weight:700;color:var(--text);background:rgba(200,156,63,.09);border:1px solid var(--border2);border-radius:10px;padding:9px 14px;cursor:pointer;transition:.15s}
    .btn:hover{background:rgba(200,156,63,.16);color:var(--gold3)}
    .btn:active{transform:translateY(1px)}
    .btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#241c08;border-color:transparent}
    .btn.gold:hover{filter:brightness(1.06)}
    .btn.sm{padding:6px 10px;font-size:11.5px}
    .btn[disabled]{opacity:.45;cursor:not-allowed}
    .action-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
    .action-row:last-child{border-bottom:none}
    .action-row .desc{font-size:11.5px;color:var(--muted);margin-top:2px}

    /* Logs / console */
    .logbox{background:var(--inset);border:1px solid var(--border);border-radius:12px;padding:13px;font-family:'Courier New',monospace;font-size:12px;color:#b9ad95;max-height:340px;overflow:auto;white-space:pre-wrap;word-break:break-word}
    .logbox .t{color:var(--dim)} .logbox .g{color:var(--gold3)} .logbox .r{color:var(--bad)} .logbox .ok{color:var(--ok)}
    .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .tabs .tab{font-size:11.5px;font-weight:700;color:var(--muted);padding:6px 12px;border:1px solid var(--border);border-radius:100px;cursor:pointer}
    .tabs .tab.active{color:var(--gold3);border-color:var(--border2);background:rgba(200,156,63,.07)}
    .banner{margin:0 0 16px;padding:11px 15px;border:1px solid var(--border2);border-radius:12px;background:linear-gradient(90deg,rgba(224,178,74,.08),transparent);font-size:12px;color:var(--gold3);display:flex;gap:10px;align-items:flex-start}
    .input{flex:1;min-width:220px;background:var(--inset);border:1px solid var(--border2);border-radius:10px;padding:10px 13px;color:var(--text);font-family:'Inter';font-size:13px}

    /* mobile */
    .menu-btn{display:none}
    @media(max-width:900px){
      .layout{grid-template-columns:1fr}
      aside{position:fixed;left:0;top:0;z-index:60;width:var(--sidebar);transform:translateX(-100%);transition:.25s}
      aside.open{transform:none}
      .menu-btn{display:inline-flex}
      .grid.cols-4,.grid.cols-3,.grid.cols-2,.grid.cols-5{grid-template-columns:1fr}
      .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:none}.scrim.show{display:block}
    }
  </style>
</head>
<body>
<div class="layout">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="brand">
      <div class="shield">Z</div>
      <div><b>ZTU Governance</b><small>Admin Panel</small></div>
    </div>
    <nav class="side" id="sideNav"></nav>
    <div class="side-foot">
      <a href="admin-dashboard.html">← Admin Dashboard</a><br/>
      ZGF V1 · Monitoring &amp; control interface.<br/>
      Evidence-first — no metric is simulated.
    </div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <!-- MAIN -->
  <main>
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn sm menu-btn" id="menuBtn">☰</button>
        <div>
          <h1 id="modTitle">Executive Dashboard</h1>
          <div class="sub" id="modSub">Platform health at a glance — every metric cites its live source</div>
        </div>
      </div>
      <div class="top-right">
        <button class="btn sm" id="refreshBtn" title="Re-run all live probes">↻ Refresh</button>
        <div class="conn"><span class="dot" id="connDot"></span><span id="connTxt">Checking backend…</span></div>
      </div>
    </div>
    <div class="wrap" id="wrap"><!-- modules injected here --></div>
  </main>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   ZTU GOVERNANCE ADMIN — evidence-first, component-based.

   DESIGN RULE (unchanged): NO fabricated data. A metric is only ever shown as a
   real number returned by a live API, or as an explicit "Not Connected" /
   "Waiting for Backend" state THAT NAMES THE REASON. Nothing is simulated.

   WHAT CHANGED vs the old build:
   • The old page set API.liveState=null and hydrate() bailed immediately, so
     100% of cards rendered "Not Connected" even though real endpoints exist.
   • This build probes the endpoints that DO exist (diagnose / ai-kb-admin /
     ai-chat) and hydrates real values, while keeping unwired metrics honest.
   ═══════════════════════════════════════════════════════════════════════════ */

/* ── LIVE DATA SOURCES ─────────────────────────────────────────────────────
   Each source is a real, existing endpoint. `auth:'admin'` requires the shared
   AI_ADMIN_KEY (sessionStorage 'ztu_kb_admin_key', set by KB Admin / AI
   Articles login). The secret is NEVER embedded in this page. */
const ADMIN_KEY = () => { try { return sessionStorage.getItem('ztu_kb_admin_key') || ''; } catch (_) { return ''; } };

const STATE = {
  hydratedAt: null,
  diagnose:   { status:'idle', reason:'not yet probed', data:null },  // GET /api/diagnose (open)
  health:     { status:'idle', reason:'not yet probed', data:null },  // GET ?action=health (admin)
  kbstatus:   { status:'idle', reason:'not yet probed', data:null },  // GET ?action=status (admin)
  parity:     { status:'idle', reason:'not yet probed', data:null },  // GET ?action=parity (admin)
  deploy:     { status:'idle', reason:'not yet probed', data:null },  // GET ?action=deployment-probe (admin)
};

const SOURCES = [
  { id:'diagnose', label:'Provider Diagnostics', endpoint:'/api/diagnose', method:'GET', auth:'open',
    supplies:'Backend reachability · Deployment · market-data provider health (FRED, Finnhub, TwelveData)' },
  { id:'health', label:'AI Health Report', endpoint:'/api/ai-kb-admin?action=health', method:'GET', auth:'admin',
    supplies:'Overall Health score · Knowledge Graph · AI Articles · concept counts · retrieval quality' },
  { id:'kbstatus', label:'KB Provision Status', endpoint:'/api/ai-kb-admin?action=status', method:'GET', auth:'admin',
    supplies:'AI Supabase configured · graph enabled · schema · published concept count' },
  { id:'parity', label:'Graph Parity Check', endpoint:'/api/ai-kb-admin?action=parity', method:'GET', auth:'admin',
    supplies:'Graph⇄seed parity — proves graph retrieval matches the canonical KB_SEED' },
  { id:'deploy', label:'Deployment Probe', endpoint:'/api/ai-kb-admin?action=deployment-probe', method:'GET', auth:'admin',
    supplies:'Live build tag · runtime versions · confirms production runs the latest bundle' },
  { id:'chat', label:'Chatbot Engine', endpoint:'/api/ai-chat', method:'POST', auth:'open',
    supplies:'AI Playground answers + source-badge (which retrieval layer answered)' },
];

async function probe(stateKey, endpoint, auth){
  const s = STATE[stateKey]; s.status='wait'; s.reason='probing…';
  const headers = { 'Accept':'application/json' };
  if (auth==='admin'){
    const k = ADMIN_KEY();
    if (!k){ s.status='idle'; s.reason='admin key not set — log in via KB Admin / AI Articles'; s.data=null; return s; }
    headers['x-admin-key'] = k;
  }
  try {
    const r = await fetch(endpoint, { method:'GET', headers });
    if (r.status===403){ s.status='bad'; s.reason='admin key rejected (HTTP 403)'; s.data=null; return s; }
    if (!r.ok){ s.status='bad'; s.reason='HTTP '+r.status; s.data=null; return s; }
    s.data = await r.json(); s.status='ok'; s.reason='live'; return s;
  } catch(err){ s.status='bad'; s.reason='unreachable (expected in local/preview — deploy to Cloudflare)'; s.data=null; return s; }
}

async function hydrate(){
  setConn('wait','Probing live sources…');
  await Promise.all([
    probe('diagnose','/api/diagnose','open'),
    probe('health','/api/ai-kb-admin?action=health','admin'),
    probe('kbstatus','/api/ai-kb-admin?action=status','admin'),
    probe('parity','/api/ai-kb-admin?action=parity','admin'),
    probe('deploy','/api/ai-kb-admin?action=deployment-probe','admin'),
  ]);
  STATE.hydratedAt = new Date();
  // Connection verdict: live if the OPEN backend probe (diagnose) responded;
  // partial if only admin sources or vice-versa; else offline.
  const backend = STATE.diagnose.status==='ok';
  const admin   = ['health','kbstatus','parity','deploy'].some(k=>STATE[k].status==='ok');
  if (backend && admin) setConn('live','Backend: Connected · admin sources live');
  else if (backend)     setConn('part','Backend: Connected · admin sources need key');
  else if (admin)       setConn('part','Admin sources live · open backend unreachable');
  else                  setConn('idle','Backend: Not Connected');
  renderModule(currentKey);
  refreshNavLeds();
}
function setConn(cls,txt){
  const d=document.getElementById('connDot'); d.className='dot'+(cls==='live'?' live':cls==='part'?' part':'');
  document.getElementById('connTxt').textContent=txt;
}

/* ── VALUE RESOLVERS — pull real values out of STATE, or return an honest miss.
   Each returns { value, state, sub } where value===null means "Not Connected"
   and `sub` explains WHY (the reason from the owning source). */
const nz = v => (v===0 || v) ? v : null;
function fromHealth(path, fallbackFmt){
  const s=STATE.health;
  if (s.status!=='ok') return { value:null, sub:s.reason };
  const v = path(s.data);
  return { value: (v===0||v) ? (fallbackFmt?fallbackFmt(v):v) : null, sub:(v===0||v)?'live':'field absent in response' };
}
function scoreState(n){ return n>=80?'ok':n>=50?'warn':'bad'; }

/* ── EXECUTIVE STATUS RIBBON — the "no scrolling required" summary. ── */
function ribbonItems(){
  const H=STATE.health.data, D=STATE.diagnose.data, KS=STATE.kbstatus.data;
  const score = STATE.health.status==='ok' ? (H.productionScore ?? null) : null;
  const providersOk = D ? Object.values(D.summary||{}).filter(x=>x==='OK').length : null;
  const providersTot = D ? Object.keys(D.summary||{}).length : null;
  const graphActive = KS ? KS.graphEnabled : (H ? H.retrievalQuality?.graphActive : null);
  const concepts = H ? (H.graphGrowth?.totalConcepts) : (KS ? KS.conceptCount : null);
  const articles = H ? (H.articleCoverage?.totalArticles) : null;
  return [
    { lab:'Platform', ic:'🌐', ...(function(){ // static repo is always served; backend probe confirms Functions
        if (STATE.diagnose.status==='ok') return {val:'Operational', led:'ok', sub:'static + Functions serving'};
        if (STATE.diagnose.status==='wait') return {val:'Checking…', led:'wait', sub:''};
        return {val:'Site up · API ?', led:'warn', sub:'static served; Functions unverified'}; })() },
    { lab:'Backend', ic:'🔌', ...(STATE.diagnose.status==='ok'
        ? {val:'Connected', led:'ok', sub:'/api/diagnose responded'}
        : STATE.diagnose.status==='wait' ? {val:'Checking…', led:'wait', sub:''}
        : {val:'Not Connected', led:'bad', sub:STATE.diagnose.reason}) },
    { lab:'Deployment', ic:'🚀', ...(providersOk!=null
        ? {val:providersOk+' / '+providersTot+' OK', led: providersOk===providersTot?'ok':providersOk>0?'warn':'bad', sub:'upstream providers'}
        : {val:'—', led:'idle', sub:STATE.diagnose.reason}) },
    { lab:'Knowledge Graph', ic:'🕸️', ...(graphActive!=null
        ? {val: graphActive?'Active':'Inactive', led: graphActive?'ok':'warn', sub: concepts!=null?(concepts+' concepts'):'kb_nodes'}
        : {val:'—', led:'idle', sub:(STATE.health.reason||STATE.kbstatus.reason)}) },
    { lab:'AI Articles', ic:'📝', ...(articles!=null
        ? {val:String(articles), led: articles>0?'ok':'warn', sub:'published articles'}
        : {val:'—', led:'idle', sub:STATE.health.reason}) },
    { lab:'Automation', ic:'⚙️', val:'Not Connected', led:'idle', sub:'no runtime automation API exists' },
    { lab:'Chatbot', ic:'🤖', val: STATE.diagnose.status==='ok'?'Endpoint ready':'Ready', led: 'wait', sub:'/api/ai-chat — test in Playground' },
    { lab:'SEO', ic:'🔎', val:'Repo scan', led:'wait', sub:'no runtime SEO API — repo-based' },
    { lab:'Overall Health', ic:'❤️', ...(score!=null
        ? {val:score+' / 100', led:scoreState(score), sub:'AI health report'}
        : {val:'—', led:'idle', sub:STATE.health.reason}) },
    { lab:'Graph Parity', ic:'⚖️', ...(STATE.parity.status==='ok'
        ? {val: STATE.parity.data.parity?'Passing':'Drift', led: STATE.parity.data.parity?'ok':'bad', sub:(STATE.parity.data.checked||0)+' seed checks'}
        : {val:'—', led:'idle', sub:STATE.parity.reason}) },
  ];
}
function renderRibbon(){
  const g=el('div','ribbon');
  ribbonItems().forEach(it=>{
    const c=el('div','stat');
    c.innerHTML=`<div class="lab"><span class="ic">${it.ic}</span>${it.lab}</div>
      <div class="val"><span class="led ${it.led}"></span>${it.val}</div>
      <div class="sub">${it.sub||''}</div>`;
    g.appendChild(c);
  });
  return g;
}
function renderExecHero(){
  const H=STATE.health.data, DEP=STATE.deploy.data;
  const score = STATE.health.status==='ok' ? (H.productionScore ?? null) : null;
  const ver   = STATE.deploy.status==='ok' ? DEP.buildVersion : null;
  const refresh = STATE.hydratedAt ? STATE.hydratedAt.toLocaleString() : '—';
  const hero=el('div','hero');
  const left=el('div','hero-card');
  left.innerHTML=`
    <div class="hero-title">Z Trade University <span class="pill">Governance V1</span></div>
    <div class="hero-desc">Single control surface for the platform's knowledge, AI content, chatbot and deployment health. This is a <b>monitoring &amp; control interface</b> — every figure below is pulled from a live API or shown as an explicit, reasoned "Not Connected".</div>
    <dl class="kv">
      <dt>Project</dt><dd>ztradeuniversity</dd>
      <dt>Platform status</dt><dd>${STATE.diagnose.status==='ok'?'Operational':'Unverified'}</dd>
      <dt>Backend</dt><dd>${STATE.diagnose.status==='ok'?'Connected':'Not Connected'}</dd>
      <dt>Current build</dt><dd>${ver? '<code>'+ver+'</code>' : (STATE.deploy.reason)}</dd>
      <dt>Runtime source</dt><dd>${DEP?.deploymentSource || 'Cloudflare Pages Functions'}</dd>
      <dt>Latest bundle</dt><dd>${DEP? (DEP.allLatest?'Yes ✓':'Mixed versions') : '—'}</dd>
      <dt>Last refresh</dt><dd>${refresh}</dd>
    </dl>`;
  const right=el('div','hero-card');
  const pct = score!=null ? score : 0;
  const col = score==null ? 'var(--idle)' : (score>=80?'var(--ok)':score>=50?'var(--warn)':'var(--bad)');
  const circ=2*Math.PI*64, off=circ*(1-pct/100);
  right.innerHTML=`<div class="ringwrap">
    <div class="ring">
      <svg width="150" height="150" viewBox="0 0 150 150">
        <circle cx="75" cy="75" r="64" stroke="rgba(255,255,255,.06)" stroke-width="13" fill="none"/>
        <circle cx="75" cy="75" r="64" stroke="${col}" stroke-width="13" fill="none" stroke-linecap="round"
          stroke-dasharray="${circ}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .6s ease"/>
      </svg>
      <div class="lbl"><b>${score!=null?score:'—'}</b><span>Overall Health</span></div>
    </div>
    <div style="font-size:11.5px;color:var(--muted);max-width:26ch">${score!=null?'Weighted AI production score (activation + coverage + structural checks).':(STATE.health.reason)}</div>
  </div>`;
  hero.appendChild(left); hero.appendChild(right);
  return hero;
}

async function runAction(id){

}

/* ── AI Playground — SSE aware ── */
function renderPlayground(){
  const c=el('div','card full');
  c.innerHTML=`<h3>🧪 AI Playground <span class="badge src" style="margin-left:8px">live engine</span></h3>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">Queries <code>/api/ai-chat</code> and parses the response stream. The <b>Source Badge</b> shows which retrieval layer actually answered — nothing is fabricated.</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <input id="pgQ" class="input" placeholder="Ask a trading question…" />
      <button class="btn gold" id="pgAsk">Ask</button>
    </div>
    <div style="margin-top:14px">
      <div class="k" style="text-transform:uppercase;color:var(--muted);font-size:11px;font-weight:700">Answer</div>
      <div id="pgResp" class="logbox" style="margin-top:6px;min-height:70px"><span class="g">Ready</span> — submit a question to call the engine.</div>
    </div>
    <div class="grid cols-3" style="margin-top:14px">
      <div class="card"><div class="k">Source Layer</div><div class="meta"><span class="badge nc" id="pgSrc">—</span></div></div>
      <div class="card"><div class="k">Answer Length</div><div class="v" id="pgLen" style="font-size:18px">—</div></div>
      <div class="card"><div class="k">Latency</div><div class="v" id="pgMs" style="font-size:18px">—</div></div>
    </div>`;
  const ask=async()=>{
    const q=c.querySelector('#pgQ').value.trim(); if(!q)return;
    const resp=c.querySelector('#pgResp'); resp.textContent='Querying engine…';
    c.querySelector('#pgSrc').textContent='—'; c.querySelector('#pgLen').textContent='—'; c.querySelector('#pgMs').textContent='—';
    const t0=Date.now();
    try{
      const r=await fetch('/api/ai-chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:q}]})});
      if(!r.ok){ resp.innerHTML=`<span class="r">HTTP ${r.status}</span> — engine error.`; return; }
      // Parse SSE frames: {t} tokens accumulate; {source} = badge.
      const reader=r.body.getReader(); const dec=new TextDecoder(); let buf='',answer='',src=null;
      while(true){
        const {done,value}=await reader.read(); if(done)break;
        buf+=dec.decode(value,{stream:true});
        const parts=buf.split('\n\n'); buf=parts.pop();
        for(const p of parts){
          const line=p.replace(/^data:\s*/,'').trim(); if(!line||line==='[DONE]')continue;
          try{ const j=JSON.parse(line); if(j.t)answer+=j.t; if(j.source)src=j.source; }catch(_){}
        }
        resp.textContent=answer||'…';
      }
      resp.textContent=answer||'(empty response)';
      c.querySelector('#pgLen').textContent=answer.length+' ch';
      c.querySelector('#pgMs').textContent=(Date.now()-t0)+' ms';
      const badge=c.querySelector('#pgSrc');
      if(src){ const label=(src.label||src.stage||src.layer||JSON.stringify(src)); badge.textContent=(typeof label==='string'?label:JSON.stringify(label)); badge.className='badge ok'; }
      else { badge.textContent='not reported'; badge.className='badge nc'; }
    }catch(err){ resp.innerHTML='<span class="r">Unreachable</span> — engine only runs on the deployed Cloudflare Functions (expected on local preview).'; }
  };
  c.querySelector('#pgAsk').addEventListener('click',ask);
  c.querySelector('#pgQ').addEventListener('keydown',e=>{if(e.key==='Enter')ask();});
  return c;
}

/* ── snapshot / export ── */
function resolveModuleMetrics(key){
  const m=MODULES[key]; const out=[];
  const push=list=>list.forEach(x=>{ let v=null,sub=x.note||('source:'+x.source); if(x.resolver){const r=x.resolver(STATE);v=r.value;if(r.sub)sub=r.sub;} out.push({metric:x.k,value:v==null?'Not Connected':v,source:x.source,detail:sub}); });
  if(m.metrics) push(m.metrics);
  return out;
}
function snapshot(){
  return {
    generatedAt:new Date().toISOString(),
    hydratedAt: STATE.hydratedAt?STATE.hydratedAt.toISOString():null,
    note:'Governance Admin live snapshot. Unconnected metrics export with their reason — no fabricated values.',
    sources: SOURCES.map(s=>({label:s.label,endpoint:s.endpoint,auth:s.auth,status:(STATE[s.id]?.status||'on-demand'),reason:(STATE[s.id]?.reason||'—')})),
    raw:{ health:STATE.health.data, status:STATE.kbstatus.data, parity:STATE.parity.data, deploy:STATE.deploy.data, diagnose:STATE.diagnose.data },
    modules:Object.fromEntries(Object.keys(MODULES).filter(k=>MODULES[k].metrics||MODULES[k].exec).map(k=>[k,resolveModuleMetrics(k)])),
  };
}
function exportReport(type, reportId){
  const s=snapshot();
  const scopeMap={executive:['executive'],knowledge:['knowledge'],graph:['graph'],deployment:['deployment'],connections:[],system:null};
  const keys=scopeMap[reportId];
  const scoped={generatedAt:s.generatedAt,hydratedAt:s.hydratedAt,report:reportId,note:s.note,sources:s.sources,
    modules: keys===null ? s.modules : (keys.length? Object.fromEntries(keys.map(k=>[k,s.modules[k]||[]])) : {}),
    raw: reportId==='system'||reportId==='deployment'||reportId==='connections' ? s.raw : undefined };
  const st=document.getElementById('repStatus'); const fname=reportId+'-report';
  if(type==='json'){ download(fname+'.json',JSON.stringify(scoped,null,2),'application/json'); }
  else if(type==='csv'){
    let rows=[['module','metric','value','source','detail']];
    for(const [k,arr] of Object.entries(scoped.modules)) (arr||[]).forEach(x=>rows.push([k,x.metric,x.value,x.source,x.detail]));
    if(!Object.keys(scoped.modules).length){ (s.sources).forEach(x=>rows.push(['source',x.label,x.status,x.endpoint,x.reason])); }
    download(fname+'.csv',rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n'),'text/csv');
  } else { window.print(); }
  if(st) st.innerHTML=`<span class="badge ok">Exported ${reportId} — ${type.toUpperCase()} (live state @ ${s.hydratedAt||'not hydrated'})</span>`;
}
function download(name,data,mime){const b=new Blob([data],{type:mime});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}

/* ── nav + boot ── */
let currentKey='executive';
const NAV_GROUPS=['Overview','Governance','Knowledge','AI','Ops'];
function buildNav(){
  const n=document.getElementById('sideNav'); n.innerHTML='';
  NAV_GROUPS.forEach(group=>{
    const entries=Object.entries(MODULES).filter(([,m])=>m.group===group);
    if(!entries.length)return;
    n.appendChild(el('div','navgroup',group));
    entries.forEach(([k,m])=>{ const a=el('a',k===currentKey?'active':''); a.dataset.k=k;
      a.innerHTML=`<span class="ico">${m.icon}</span>${m.title}<span class="st" data-led="${k}"></span>`;
      a.onclick=()=>{currentKey=k;renderModule(k);}; n.appendChild(a); });
  });
  refreshNavLeds();
}
function refreshNavLeds(){
  const led=(k,cls)=>{const e=document.querySelector(`[data-led="${k}"]`);if(e)e.className='st '+cls;};
  led('executive', STATE.diagnose.status==='ok'?'ok':STATE.diagnose.status==='bad'?'bad':'');
  led('connections', ['diagnose','health','kbstatus','parity','deploy'].some(x=>STATE[x].status==='ok')?'ok':'');
  led('knowledge', STATE.health.status==='ok'?'ok':STATE.health.status==='bad'?'bad':'');
  led('graph', STATE.kbstatus.status==='ok'?'ok':STATE.kbstatus.status==='bad'?'bad':'');
  led('articles', STATE.health.status==='ok'?'ok':'');
  led('chatbot', STATE.diagnose.status==='ok'?'ok':'');
  led('deployment', STATE.deploy.status==='ok'?'ok':STATE.diagnose.status==='ok'?'warn':'');
  led('governance','warn'); led('seo','warn'); led('automation','warn');
}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('scrim').classList.remove('show');}
document.getElementById('menuBtn').onclick=()=>{document.getElementById('sidebar').classList.toggle('open');document.getElementById('scrim').classList.toggle('show');};
document.getElementById('scrim').onclick=closeSidebar;
document.getElementById('refreshBtn').onclick=()=>hydrate();

buildNav(); renderModule('executive'); setConn('wait','Checking backend…'); hydrate();
</script>
