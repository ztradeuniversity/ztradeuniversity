<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ZTU Admin Portal</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="stylesheet" href="css/admin-portal.css" />
</head>
<body>
<div class="zap-launcher">
  <div class="head">
    <h1>ZTU Admin Portal</h1>
    <p>Launcher only — no login here. Each tool below has its own independent password.</p>
  </div>
  <div class="zap-grid" id="zapGrid"></div>
</div>

<script>
const TOOLS = [
  { icon:'🏛', name:'Executive Dashboard', desc:'Command center — license requests, broker intake, CRM & IB management.', href:'pages/admin-dashboard.html' },
  { icon:'🕸', name:'Knowledge Graph Admin', desc:'Concept nodes, edges, retrieval & authoring for the AI mentor graph.', href:'pages/kb-admin.html' },
  { icon:'📡', name:'Signal Admin', desc:'Create, edit and publish trading signals shown to members.', href:'pages/signal-admin.html' },
  { icon:'⚖️', name:'Governance', desc:'Board status, registers and governance operations center.', href:'pages/governance-admin.html' },
  { icon:'📰', name:'AI Article Manager', desc:'Author, auto-meta and publish AI knowledge/SEO articles.', href:'pages/ai-articles.html' },
  { icon:'💬', name:'AI Feedback', desc:'Review answer ratings and self-improvement recommendations.', href:'pages/ai-feedback.html' },
  { icon:'🧭', name:'System Architecture', desc:'Read-only map of the whole ecosystem — repos, APIs, env, Supabase.', href:'pages/system-architecture.html' },
  { icon:'📓', name:'Journal Admin', desc:'Mentor workspace — trader reviews, analytics and reports.', href:'pages/journal-admin.html' },
  { icon:'📖', name:'Library Admin', desc:'Manage gated library content, uploads and storage buckets.', href:'pages/library-admin.html' },
];

const grid = document.getElementById('zapGrid');
grid.innerHTML = TOOLS.map(t =>
  '<div class="zap-card">' +
    '<div class="icon">' + t.icon + '</div>' +
    '<h3>' + t.name + '</h3>' +
    '<p>' + t.desc + '</p>' +
    '<a href="' + t.href + '">Open →</a>' +
  '</div>'
).join('');
</script>
</body>
</html>
